<style>
*{
    margin:0;

}

body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    color:white;
    text-align:center;
}

header{
    padding:20px;
    background:rgba(0,0,0,0.2);
}

}

.hero{
    padding:100px 20px;
}

.hero h1{
    font-size:50px;
}

.hero p{
    margin-top:15px;
    font-size:20px;
}

button{
    margin-top:25px;
    padding:12px 30px;
    border:none;
    border-radius:30px;
    background:white;
    color:#0077ff;
    font-size:18px;
    cursor:pointer;

.cards{
    display:flex;
    justify-content:center;
